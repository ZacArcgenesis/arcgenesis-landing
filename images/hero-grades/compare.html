<!doctype html>
<!-- Contact sheet for the hero photo grade variants. Open directly in a
     browser (double-click). Local reference only; not part of the site. -->
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hero photo grades — compare</title>
<style>
  body { margin: 0; padding: 32px; background: #16191f; color: #f8f9fa; font-family: system-ui, sans-serif; }
  h1 { font-size: 20px; margin: 0 0 24px; }
  .row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  figure { margin: 0; width: 300px; }
  img { width: 100%; border-radius: 12px; border: 1px solid rgba(55,211,241,.28); display: block; }
  figcaption { margin-top: 10px; font-size: 14px; color: rgba(255,255,255,.75); }
  .dark-demo { background: #181b21; padding: 16px; border-radius: 14px; }
</style>
</head>
<body>
  <h1>Hero photo grades (each shown on the hero's dark background)</h1>
  <div class="row">
    <figure><div class="dark-demo"><img src="original.jpg" alt="" /></div><figcaption><strong>Original</strong> — untouched</figcaption></figure>
    <figure><div class="dark-demo"><img src="A-cinematic-cool.jpg" alt="" /></div><figcaption><strong>A</strong> — cinematic cool, subtle</figcaption></figure>
    <figure><div class="dark-demo"><img src="B-moody-dark.jpg" alt="" /></div><figcaption><strong>B</strong> — moody, darker, desaturated</figcaption></figure>
    <figure><div class="dark-demo"><img src="C-warm-lift.jpg" alt="" /></div><figcaption><strong>C</strong> — warm lift, brighter face</figcaption></figure>
    <figure><div class="dark-demo"><img src="D-golden-hour.jpg" alt="" /></div><figcaption><strong>D</strong> — golden hour, warmest + brightest</figcaption></figure>
  </div>
</body>
</html>
