<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#20232a"/>
  <!-- Outer circle, outline only -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#37d3f1" stroke-width="1.5"/>
  <!-- Rotated square (diamond), outline only -->
  <rect x="10.5" y="10.5" width="11" height="11" fill="none" stroke="#37d3f1" stroke-width="1" transform="rotate(45 16 16)"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2.5" fill="#37d3f1"/>
</svg>
