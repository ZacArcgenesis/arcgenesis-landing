<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 580" font-family="Inter, -apple-system, Segoe UI, sans-serif">
  <rect width="700" height="580" fill="#20232a"/>
  <g stroke="#2a2e37" stroke-width="1">
    <path d="M100 0V580M200 0V580M300 0V580M400 0V580M500 0V580M600 0V580"/>
    <path d="M0 100H700M0 200H700M0 300H700M0 400H700M0 500H700"/>
  </g>

  <!-- white document card -->
  <rect x="70" y="42" width="560" height="496" rx="12" fill="#ffffff"/>

  <!-- filename + divider -->
  <text x="106" y="88" fill="#5a6170" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">environment-audit.md</text>
  <line x1="106" y1="102" x2="594" y2="102" stroke="#e3e6ea" stroke-width="1"/>

  <!-- Section 1: Glance -->
  <text x="106" y="138" fill="#20232a" font-size="16" font-weight="700">Your Environment at a Glance</text>
  <g fill="#3c424e" font-size="14.5">
    <text x="106" y="162">The biggest pressure on your spending is one-click checkout</text>
    <text x="106" y="184">across 8+ retailers, late-evening DoorDash use, and lifestyle</text>
    <text x="106" y="206">accounts on Instagram driving "I want that" reactions.</text>
  </g>

  <!-- Section 2: Spending Loop -->
  <text x="106" y="248" fill="#20232a" font-size="16" font-weight="700">Your Spending Loop</text>
  <g fill="#3c424e" font-size="14.5">
    <text x="106" y="272">Instagram creates the want, your saved cards make acting on</text>
    <text x="106" y="294">it instant, and "it's only $30" makes it feel harmless. By the</text>
    <text x="106" y="316">time you're checking out, the decision happened three steps ago.</text>
  </g>

  <!-- Section 3: 7-Day Reset -->
  <text x="106" y="358" fill="#20232a" font-size="16" font-weight="700">Your 7-Day Environment Reset</text>
  <g fill="#3c424e" font-size="14.5">
    <text x="106" y="384"><tspan font-weight="700" fill="#20232a">Day 1:</tspan> Remove your saved card from every retailer.</text>
    <text x="106" y="412"><tspan font-weight="700" fill="#20232a">Day 2:</tspan> Move DoorDash off your home screen and into a folder.</text>
    <text x="106" y="440"><tspan font-weight="700" fill="#20232a">Day 3:</tspan> Unsubscribe from every promotional email. Twenty</text>
    <text x="106" y="462">minutes, all of them.</text>
  </g>
  <text x="106" y="498" fill="#9aa1ad" font-size="14" font-style="italic">...continues through Day 7</text>
</svg>
