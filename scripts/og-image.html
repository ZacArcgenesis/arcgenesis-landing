<!doctype html>
<!--
  og-image.html — source for public/og-image.png (1200x630).

  Regenerate after edits with headless Chrome from the repo root:

    & "C:\Program Files\Google\Chrome\Application\chrome.exe" `
      --headless=new --disable-gpu --hide-scrollbars `
      --window-size=1200,630 --virtual-time-budget=10000 `
      --screenshot="public/og-image.png" "scripts/og-image.html"

  Built from the site design system: deep dark band (#16191f), the subtle
  grid texture, cyan accent (#37d3f1), Geist for type. The logo mark is
  referenced from ../public/logo-mark.png.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&display=swap" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    position: relative;
    background: #16191f;
    font-family: 'Geist', system-ui, sans-serif;
    color: #ffffff;
    border-top: 6px solid #37d3f1;
  }
  /* Grid texture, same recipe as .grid-texture on the site. */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
    background-size: 56px 56px;
    -webkit-mask-image: radial-gradient(ellipse 85% 75% at 50% 40%, #000 40%, transparent 100%);
    mask-image: radial-gradient(ellipse 85% 75% at 50% 40%, #000 40%, transparent 100%);
  }
  /* Soft cyan glow behind the headline. */
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 58%, rgba(55, 211, 241, 0.13), transparent 55%);
    filter: blur(18px);
  }
  .content {
    position: relative;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 44px;
    padding-bottom: 14px;
  }
  .brand {
    display: flex;
    align-items: center;
  }
  .brand img { height: 64px; }
  .brand-text {
    margin-left: -10px;
    font-size: 27px;
    font-weight: 600;
    letter-spacing: 0.08em;
  }
  .brand-suffix {
    margin-left: 14px;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: rgba(255, 255, 255, 0.5);
  }
  h1 {
    font-size: 96px;
    font-weight: 700;
    line-height: 1.08;
    letter-spacing: -0.035em;
  }
  h1 .accent { color: #37d3f1; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="brand">
      <img src="../public/logo-mark.png" alt="" />
      <span class="brand-text">RCGENESIS<span class="brand-suffix">Finance</span></span>
    </div>
    <h1>4 Hours to<br /><span class="accent">Financial Confidence</span></h1>
  </div>
</body>
</html>
